name: Android CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── Job 1: Compile & package ───────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle # caches ~/.gradle between runs — faster CI

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        # assembleDebug compiles + packages only — does NOT run lint.
        # This job's only job is to verify the code compiles and links.
        # versionCode is set to the monotonically-increasing run number so the
        # app can compare it against the latest GitHub Release.
        run: ./gradlew assembleDebug --stacktrace -PversionCode=${{ github.run_number }} -PversionName="1.0.${{ github.run_number }}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Create GitHub Release
        # Only publish a release on direct pushes (not on PRs).
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/*.apk

  # ── Job 2: Lint (non-blocking, informational) ──────────────────────────────
  lint:
    name: Lint check
    runs-on: ubuntu-latest
    # Lint runs in parallel with build, does not block the build job.
    # Remove `continue-on-error` if you want lint failures to fail the PR check.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint report
        # Always upload so you can review even when lint finds issues
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint/
          retention-days: 7
