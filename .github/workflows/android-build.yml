name: Android CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── Job 1: Compile & package ───────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle # caches ~/.gradle between runs — faster CI

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Restore release keystore
        # Decodes the keystore stored as a base64 GitHub secret so CI signs
        # with the same certificate as your local machine — required for
        # Android to accept the APK as an update to an already-installed app.
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ERROR: RELEASE_KEYSTORE_B64 secret is not set." >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          keytool -list \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -noprompt \
            || { echo "ERROR: Decoded keystore is invalid." >&2; exit 1; }

      - name: Build release APK
        run: |
          ./gradlew assembleRelease --stacktrace \
            -PversionCode=${{ github.run_number }} \
            -PversionName="1.0.${{ github.run_number }}" \
            -PreleaseStoreFile="$RUNNER_TEMP/release.keystore" \
            -PreleaseStorePassword="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -PreleaseKeyAlias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -PreleaseKeyPassword="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          files: app/build/outputs/apk/release/*.apk

  # ── Job 2: Lint (non-blocking, informational) ──────────────────────────────
  lint:
    name: Lint check
    runs-on: ubuntu-latest
    # Lint runs in parallel with build, does not block the build job.
    # Remove `continue-on-error` if you want lint failures to fail the PR check.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint report
        # Always upload so you can review even when lint finds issues
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint/
          retention-days: 7
